spring:
  application:
    name: Uber-API-Gateway
  cloud:
    gateway:
      default-filters:
        - name: RequestRateLimiter
          args:
            replenishRate: 10
            burstCapacity: 20
            key-resolver: "#{@userKeyResolver}"

server:
  port: 8080

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

jwt:
  secret: undergroundjddkdjkdjododkdjdkldkdldjkdkdljdljdkldjldldjdldjldjldjdldljdld

management:
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    health:
      show-details: always

logging:
  level:
    org.springframework.cloud.gateway: DEBUG
    org.springframework.web: DEBUG