spring:
  application:
    name: Uber-BookingService

  kafka:
    bootstrap-servers: localhost:9092

  jpa:
    hibernate:
      ddl-auto: validate

  datasource:
    url: jdbc:mysql://localhost:3306/uber_db_local
    username: root
    password: root

  data:
    redis:
      host: localhost
      port: 6379
      timeout: 2s

server:
  port: 8001

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka
  instance:
    preferIpAddress: true

urbanlift:
  lock:
    booking-create:
      prefix: "urbanlift:lock:booking:create:"
      lease-ms: 15000
      wait-ms: 3000
