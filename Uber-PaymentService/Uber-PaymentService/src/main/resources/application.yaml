spring:
  application:
    name: Uber-PaymentService
  kafka:
    bootstrap-servers: localhost:9092

  jpa:
    hibernate:
      ddl-auto: update

  datasource:
    url: jdbc:mysql://localhost:3306/uber_db_local
    username: root
    password: root

server:
  port: 8082

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka
  instance:
    preferIpAddress: true

# Mock payment gateway config
payment:
  gateway:
    mock: true
    razorpay:
      key: mock_razorpay_key
      secret: mock_razorpay_secret
    stripe:
      key: mock_stripe_key